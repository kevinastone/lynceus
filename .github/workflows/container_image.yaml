# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Container Image

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Magic Nix Cache (Faster Builds)
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d

      # Generate docker tags
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kevinastone/argus
          context: git

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build Docker Image with Nix
        # This step outputs a symlink named 'result' pointing to the image tarball
        run: nix build .#image

      # 3b. Push the resulting tarball using Skopeo
      - name: ⬆️ Push Image to GHCR with Skopeo
        env:
          # Tags generated by the metadata action
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # The tags output is a newline-separated string
          echo "$TAGS" | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "Pushing to $tag..."
              # The 'docker-archive:./result' is the source (Nix output)
              # The 'docker://tag' is the destination (GHCR registry)
              nix run .#skopeo -- --insecure-policy copy --all \
                docker-archive:./result \
                docker://$tag
            fi
          done
