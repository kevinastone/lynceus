# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write
  actions: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - &cache-nix-store
        name: Cache Nix Store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock', 'Cargo.lock') }}

      - name: Run Nix checks
        run: nix flake check -L

  container-image:
    name: Build & Push Container Image
    needs: [test]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' || 
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-platforms = aarch64-linux

      - *cache-nix-store

      # Generate docker tags
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build Multi-Arch Docker Images with Nix
        run: |
          nix build .#packages.x86_64-linux.image --out-link result-amd64 -L
          nix build .#packages.aarch64-linux.image --out-link result-arm64 -L

      - name: ⚙️ Install regctl
        run: nix profile install .#regctl

      - name: ⬆️ Push Multi-Arch Image to GHCR with Regctl
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          REPO: ${{ steps.meta.outputs.images }}
        run: |
          # Import images into local OCI layout directories directly from Nix build symlinks
          regctl image import ocidir://./local-oci-amd64 result-amd64
          regctl image import ocidir://./local-oci-arm64 result-arm64

          # Get the digests of the imported OCI layouts
          AMD64_DIGEST=$(regctl image digest ocidir://./local-oci-amd64)
          ARM64_DIGEST=$(regctl image digest ocidir://./local-oci-arm64)

          # Push single-architecture layers and manifests by digest (only once per repo)
          echo "Pushing AMD64 digest: $AMD64_DIGEST to $REPO..."
          regctl image copy ocidir://./local-oci-amd64 "$REPO@$AMD64_DIGEST"

          echo "Pushing ARM64 digest: $ARM64_DIGEST to $REPO..."
          regctl image copy ocidir://./local-oci-arm64 "$REPO@$ARM64_DIGEST"

          # Create and push the multi-architecture manifest index for each tag
          echo "$TAGS" | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "Creating and pushing multi-arch index for $tag..."
              regctl index create "$tag" \
                --ref "$REPO@$AMD64_DIGEST" \
                --platform linux/amd64 \
                --ref "$REPO@$ARM64_DIGEST" \
                --platform linux/arm64
            fi
          done

          # Cleanup local OCI layouts
          rm -rf ./local-oci-amd64 ./local-oci-arm64

  release-plz-release:
    name: Release-plz release
    needs: [test]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'kevinastone' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    needs: [test]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'kevinastone' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
